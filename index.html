<!DOCTYPE html>
<html>
<head>
<title>Junaid Web Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#4e73df,#1cc88a);
  color:white;
  transition:0.4s;
}

body.dark{
  background:#111;
  color:white;
}

/* Navbar */
nav{
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.4);
  padding:15px;
  text-align:center;
  font-weight:bold;
}

/* Toggle Button */
.toggle-btn{
  position:fixed;
  top:20px;
  right:20px;
  padding:8px 15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}

/* Hero */
.hero{
  text-align:center;
  padding:100px 20px;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  background:#ffd700;
  color:black;
  text-decoration:none;
  font-weight:bold;
  border-radius:30px;
}

/* Services */
.services{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  padding:50px 20px;
}

.card{
  background:white;
  color:black;
  padding:20px;
  width:250px;
  border-radius:15px;
}

body.dark .card{
  background:#222;
  color:white;
}

/* Footer */
footer{
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<button class="toggle-btn" onclick="toggleMode()">🌙 Mode</button>

<nav>Junaid Web Services 🚀</nav>

<section class="hero">
<h1>Build Your Dream Website</h1>
<p>I create modern, fast & responsive websites.</p>
<a href="#" class="btn">Contact Me</a>
</section>

<section class="services">
<div class="card">
<h3>Website Design</h3>
<p>Modern & responsive designs.</p>
</div>

<div class="card">
<h3>Landing Pages</h3>
<p>High converting landing pages.</p>
</div>

<div class="card">
<h3>Portfolio Sites</h3>
<p>Professional personal websites.</p>
</div>
</section>

<footer>
© 2026 Junaid Web Services
</footer>

<script>
function toggleMode(){
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
